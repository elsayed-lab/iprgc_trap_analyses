      "Author": "Paul Gilbert and Ravi Varadhan",
      "Maintainer": "Paul Gilbert <pgilbert.ttv9z@ncf.ca>",
      "URL": "http://optimizer.r-forge.r-project.org/",
      "NeedsCompilation": "no",
      "Repository": "CRAN"
    },
